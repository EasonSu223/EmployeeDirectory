<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employee Directory</title>
  <style>
    body{font-family:system-ui,"Segoe UI",sans-serif;background:#f6f8fb;margin:0;padding:40px;color:#1f2937;}
    .card{max-width:920px;margin:0 auto;background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden;}
    .card-head{padding:20px 24px;border-bottom:1px solid #eef1f5;}
    .card-head h2{margin:0;font-size:18px;}
    .card-head p{margin:4px 0 0;color:#6b7280;font-size:13px;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:14px 24px;text-align:left;font-size:14px;border-bottom:1px solid #f0f2f5;}
    th{color:#6b7280;font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
    tr:last-child td{border-bottom:none;}
    input{width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;}
    .btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
    .btn-edit{background:#eef2ff;color:#4f46e5;}
    .btn-save{background:#16a34a;color:#fff;}
    .btn-cancel{background:#f3f4f6;color:#374151;margin-left:6px;}
    .toast{position:fixed;top:20px;right:20px;color:#fff;padding:10px 16px;border-radius:8px;opacity:0;transition:.3s;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <h5 class="d-flex align-items-center">
  <span style="display:inline-flex;align-items:center;justify-content:center;
               width:36px;height:36px;border-radius:10px;background:#eef2ff;
               color:#4f46e5;margin-right:10px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
  </span>
  Recent Users
</h5>
      <p>Latest account activity across the workspace.</p>
    </div>
    <table>
      <thead>
        <tr>
            <th>USER</th><th>ROLE</th><th>TEAM</th>
            <th>STATUS</th><th>JOINED</th><th class="text-end">ACTION</th>
        </tr>
      </thead>
      <tbody id="empBody"></tbody>
    </table>
  </div>
  <div id="toast" class="toast"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
const API = '/api/employees';
const esc = s => $('<div>').text(s ?? '').html();

function statusBadge(status){
  const map = {
    Active:    { bg:'#16a34a', fg:'#fff' },
    Pending:   { bg:'#f59e0b', fg:'#fff' },
    Suspended: { bg:'#6b7280', fg:'#fff' }
  };
  const c = map[status] || map.Active;
  return `<span style="display:inline-block;padding:4px 14px;border-radius:9999px;
    background:${c.bg};color:${c.fg};font-size:12px;font-weight:600;">${esc(status)}</span>`;
}

function rowView(e, i){
  return `<tr data-id="${e.employeeId}">
    <td>
      <div class="d-flex align-items-center">
        <span class="rounded-circle d-inline-flex align-items-center justify-content-center me-2"
              style="width:40px;height:40px;background:#eef2ff;color:#4f46e5;font-weight:600;flex:0 0 40px;">
          ${esc((e.name||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase())}
        </span>
        <div>
          <div class="fw-semibold c-name">${esc(e.name)}</div>
          <small class="text-muted c-email">${esc(e.email)}</small>
        </div>
      </div>
    </td>
    <td class="c-role">${esc(e.role)}</td>
    <td>—</td>
    <td>${statusBadge('Active')}</td>
    <td>—</td>
    <td class="text-end"><button class="btn btn-sm btn-outline-primary btn-edit">Edit</button></td>
  </tr>`;
}

function rowEdit(e){
  return `<tr data-id="${e.employeeId}">
    <td>
      <input class="form-control form-control-sm mb-1 i-name"  value="${esc(e.name)}" placeholder="Name">
      <input class="form-control form-control-sm i-email" value="${esc(e.email)}" placeholder="Email">
    </td>
    <td><input class="form-control form-control-sm i-role" value="${esc(e.role)}" placeholder="Role"></td>
    <td>—</td>
    <td>${statusBadge('Active')}</td>
    <td>—</td>
    <td class="text-end" style="white-space:nowrap">
      <button class="btn btn-sm btn-success btn-save">Save</button>
      <button class="btn btn-sm btn-secondary btn-cancel">Cancel</button>
    </td>
  </tr>`;
}

function load(){
  $.getJSON(API, list => { $('#empBody').html(list.map(rowView).join('')); })
   .fail(() => alert('讀取失敗，確認 API 有啟動'));
}

$('#empBody')
  .on('click', '.btn-edit', function(){
    const $tr = $(this).closest('tr');
    $tr.replaceWith(rowEdit({
      employeeId: $tr.data('id'),
      name:  $tr.find('.c-name').text(),
      email: $tr.find('.c-email').text(),
      role:  $tr.find('.c-role').text()
    }));
  })
  .on('click', '.btn-cancel', load)
  .on('click', '.btn-save', function(){
    const $tr = $(this).closest('tr');
    const id  = $tr.data('id');
    const body = {
      employeeId: id,
      name:  $tr.find('.i-name').val(),
      email: $tr.find('.i-email').val(),
      role:  $tr.find('.i-role').val()
    };
    $.ajax({ url:`${API}/${id}`, method:'PUT',
             contentType:'application/json', data:JSON.stringify(body) })
     .done(load)
     .fail(() => alert('儲存失敗'));
  });

$(load);
</script>
</body>
</html>
